# ============================================
# Customer Service - application.properties
# ============================================

spring.application.name=customer-service
server.port=8081

# ---- MySQL DataSource ----
# When running locally, point to localhost.
# When running in Docker/K8s the SPRING_DATASOURCE_URL env var overrides this.
spring.datasource.url=jdbc:mysql://localhost:3306/customer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
