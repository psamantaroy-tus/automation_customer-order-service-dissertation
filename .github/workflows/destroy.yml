name: Destroy EKS Infrastructure

# Manual-only. Tears down EVERYTHING (EKS, RDS, ECR) via Terraform.
# Trigger from the Actions tab -> "Destroy EKS Infrastructure" -> Run workflow,
# and type DESTROY in the confirmation box.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm teardown of all infrastructure'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  # Values are irrelevant for destroy but the variables must be set.
  TF_VAR_customer_db_password: ${{ secrets.CUSTOMER_DB_PASSWORD }}
  TF_VAR_order_db_password: ${{ secrets.ORDER_DB_PASSWORD }}

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Delete LoadBalancer Service first
        run: |
          if aws eks update-kubeconfig --name dissertation-cluster --region "$AWS_REGION" 2>/dev/null; then
            kubectl delete svc order-service-svc --ignore-not-found=true
            echo "Waiting 30s for the ELB to be released..."
            sleep 30
          else
            echo "Cluster not reachable — continuing to terraform destroy."
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=tf-locks"

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve -input=false
