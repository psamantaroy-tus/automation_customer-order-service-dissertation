name: CI/CD Pipeline Testing after added username and password

# ----------------------------
# 1. TRIGGER
# ----------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ============================================================
  # 2. BUILD
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ============================================================
  # 3. UNIT TESTS
  # ============================================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Runs CustomerService_UnitTest — pure Mockito, no Spring context required
      - name: Run Unit Tests
        run: mvn test -Dtest=CustomerService_UnitTest

      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: target/surefire-reports/

  # ============================================================
  # 4. INTEGRATION TESTS
  # ============================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Runs CustomerControllerIntegrationTest — @SpringBootTest with H2 in-memory DB
      - name: Run Integration Tests
        run: mvn test -Dtest=CustomerControllerIntegrationTest

      - name: Upload Integration Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: target/surefire-reports/

  # ============================================================
  # 5. STATIC CODE ANALYSIS (SonarCloud)
  # ============================================================
  code-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=psamantaroy-tus_CI_CD_Automation_CustomerOrder_microservice
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.qualitygate.wait=true

  # ============================================================
  # 6. DOCKER BUILD & PUSH
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [integration-test, code-analysis]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

  # ============================================================
  # 7. DEPLOY TO LOCAL DOCKER DESKTOP
  # ============================================================
  deploy-local:
    name: Deploy to Local Docker Desktop
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: docker

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

      - name: Stop and remove old container (if exists)
        run: |
          $exists = docker ps -a --filter "name=customer-order-api" --format "{{.Names}}"
          if ($exists -match "customer-order-api") {
            docker stop customer-order-api
            docker rm customer-order-api
          } else {
            Write-Host "Container customer-order-api does not exist; skipping stop/remove."
          }
        shell: powershell

      - name: Run new container
        run: |
          docker run -d `
            --name customer-order-api `
            -p 9090:9090 `
            ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest
        shell: powershell

      - name: Verify container is running
        run: docker ps --filter "name=customer-order-api"

      - name: Local deployment complete
        run: echo "Local Docker Desktop deployment complete Priyanka DEMO CICD PIPELINE ASSIGNMENT 2!"